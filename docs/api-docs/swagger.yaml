                    example: false
                  error:
                    type: string
                    example: Forbidden
        '404':
          description: Mandal or user not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
                    example: Mandal or user not found
