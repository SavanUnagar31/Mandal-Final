# Mandal-Final/docker-compose.yml
version: '3.8'
services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DB_HOST=mysql
      - DB_NAME=mandal_db
      - DB_USER=root
      - DB_PASSWORD=password
      - REDIS_URL=redis://redis:6379
      - SENDGRID_API_KEY=SG.your_valid_sendgrid_api_key
      - JWT_SECRET=your_jwt_secret
    depends_on:
      - mysql
      - redis
  mysql:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=mandal_db
      - MYSQL_CHARSET=utf8mb4
      - MYSQL_COLLATION=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
  redis:
    image: redis:7
    ports:
      - "6379:6379"
volumes:
  mysql-data: